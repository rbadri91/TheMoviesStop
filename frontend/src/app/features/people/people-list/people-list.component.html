<div class="MoviesWrapper">
  <h3 class="titleHeader">Popular People</h3>

  @if (loading()) {
    <div class="text-center py-5"><div class="spinner-border" role="status"></div></div>
  }
  @if (error()) {
    <div class="alert alert-danger">{{ error() }}</div>
  }

  @if (!loading()) {
    <div class="peopleGrid">
      @for (person of people(); track person.id) {
        <div class="profileCard">
          <div class="profileImageWrapper">
            <a [routerLink]="['/people/desc', person.id]">
              <img class="personPhoto" [src]="posterBase + person.profile_path" [alt]="person.name" />
            </a>
          </div>
          <a class="personInfoWrapper" [routerLink]="['/people/desc', person.id]">
            <div class="nameWrapper">{{ person.name }}</div>
            <div class="knownForDesc" [title]="person.knownFor ?? ''">{{ person.knownFor }}</div>
          </a>
        </div>
      }
    </div>
    <app-paginator [currentPage]="currentPage()" [totalPages]="totalPages()" (pageChange)="onPageChange($event)" />
  }
</div>
