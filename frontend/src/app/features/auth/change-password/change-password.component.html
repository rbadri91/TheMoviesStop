<div class="formWrapper">
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <h3>Change Password</h3>

    @if (error()) {
      <div class="alert alert-danger">{{ error() }}</div>
    }

    @if (success()) {
      <div class="alert alert-success">{{ success() }}</div>
    }

    <div class="mb-3">
      <input
        type="password"
        class="form-control"
        placeholder="Current Password"
        formControlName="currentPassword"
        [class.is-invalid]="form.get('currentPassword')?.invalid && form.get('currentPassword')?.touched"
      />
    </div>

    <div class="mb-3">
      <input
        type="password"
        class="form-control"
        placeholder="New Password (min. 6 characters)"
        formControlName="newPassword"
        [class.is-invalid]="form.get('newPassword')?.invalid && form.get('newPassword')?.touched"
      />
    </div>

    <div class="mb-3">
      <input
        type="password"
        class="form-control"
        placeholder="Confirm New Password"
        formControlName="confirmPassword"
        [class.is-invalid]="(form.get('confirmPassword')?.touched && form.hasError('passwordsMismatch'))"
      />
      @if (form.get('confirmPassword')?.touched && form.hasError('passwordsMismatch')) {
        <div class="invalid-feedback d-block">Passwords do not match.</div>
      }
    </div>

    <button type="submit" class="btn btn-primary w-100" [disabled]="loading()">
      @if (loading()) { Updating… } @else { Update Password }
    </button>

    <p class="mt-3 text-center text-muted">
      <a routerLink="/profile">Back to Profile</a>
    </p>
  </form>
</div>
