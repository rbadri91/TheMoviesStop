<div class="formWrapper">
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <h3>Forgot Password</h3>
    <p class="text-muted mb-3">Enter your account email and we'll send you a passcode to reset your password.</p>

    @if (error()) {
      <div class="alert alert-danger">{{ error() }}</div>
    }

    @if (success()) {
      <div class="alert alert-success">
        {{ success() }}
        <br />
        <a routerLink="/reset-password">Enter your passcode here</a>
      </div>
    }

    @if (!success()) {
      <div class="mb-3">
        <input
          type="email"
          class="form-control"
          placeholder="Email address"
          formControlName="email"
          [class.is-invalid]="form.get('email')?.invalid && form.get('email')?.touched"
        />
      </div>

      <button type="submit" class="btn btn-primary w-100" [disabled]="loading()">
        @if (loading()) { Sending… } @else { Send Passcode }
      </button>
    }

    <p class="mt-3 text-center text-muted">
      <a routerLink="/login">Back to Log In</a>
    </p>
  </form>
</div>
