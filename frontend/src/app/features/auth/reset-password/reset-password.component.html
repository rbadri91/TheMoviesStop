<div class="formWrapper">
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <h3>Reset Password</h3>
    <p class="text-muted mb-3">Enter the 6-digit passcode sent to your email along with your new password.</p>

    @if (error()) {
      <div class="alert alert-danger">{{ error() }}</div>
    }

    <div class="mb-3">
      <input
        type="email"
        class="form-control"
        placeholder="Email address"
        formControlName="email"
        [class.is-invalid]="form.get('email')?.invalid && form.get('email')?.touched"
      />
    </div>

    <div class="mb-3">
      <input
        type="text"
        class="form-control"
        placeholder="6-digit passcode"
        formControlName="passcode"
        maxlength="6"
        inputmode="numeric"
        autocomplete="one-time-code"
        [class.is-invalid]="form.get('passcode')?.invalid && form.get('passcode')?.touched"
      />
    </div>

    <div class="mb-3">
      <input
        type="password"
        class="form-control"
        placeholder="New Password (min. 6 characters)"
        formControlName="newPassword"
        [class.is-invalid]="form.get('newPassword')?.invalid && form.get('newPassword')?.touched"
      />
    </div>

    <div class="mb-3">
      <input
        type="password"
        class="form-control"
        placeholder="Confirm New Password"
        formControlName="confirmPassword"
        [class.is-invalid]="form.get('confirmPassword')?.touched && form.hasError('passwordsMismatch')"
      />
      @if (form.get('confirmPassword')?.touched && form.hasError('passwordsMismatch')) {
        <div class="invalid-feedback d-block">Passwords do not match.</div>
      }
    </div>

    <button type="submit" class="btn btn-primary w-100" [disabled]="loading()">
      @if (loading()) { Resetting… } @else { Reset Password }
    </button>

    <p class="mt-3 text-center text-muted">
      Didn't get a code? <a routerLink="/forgot-password">Resend passcode</a>
    </p>
    <p class="text-center text-muted">
      <a routerLink="/login">Back to Log In</a>
    </p>
  </form>
</div>
